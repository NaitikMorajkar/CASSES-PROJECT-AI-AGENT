<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaseQuery — Detective Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg:      #0a0a0f;
    --surface: #111118;
    --border:  #1e1e2e;
    --accent:  #7c3aed;
    --accent2: #06b6d4;
    --success: #22c55e;
    --warn:    #f59e0b;
    --danger:  #ef4444;
    --text:    #e2e8f0;
    --muted:   #64748b;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .bot-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
  }

  .bot-info h2 {
    font-size: 1rem;
    font-weight: 700;
  }

  .bot-status {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.75rem;
    color: var(--success);
    font-family: 'JetBrains Mono', monospace;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .croo-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent2);
    background: rgba(6,182,212,0.1);
    border: 1px solid rgba(6,182,212,0.2);
    padding: 0.3rem 0.75rem;
    border-radius: 999px;
  }

  /* ── QUICK TOPICS ── */
  .quick-topics {
    display: flex;
    gap: 0.5rem;
    padding: 0.75rem 1.5rem;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    background: var(--surface);
  }

  .topic-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.35rem 0.9rem;
    border-radius: 999px;
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .topic-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── CHAT AREA ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .message {
    display: flex;
    gap: 0.75rem;
    max-width: 80%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .message.bot { align-self: flex-start; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
  }

  .bot .msg-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .user .msg-avatar {
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .msg-bubble {
    padding: 0.75rem 1rem;
    border-radius: 12px;
    font-size: 0.88rem;
    line-height: 1.6;
  }

  .bot .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .user .msg-bubble {
    background: var(--accent);
    color: white;
    border-top-right-radius: 4px;
  }

  .msg-bubble code {
    font-family: 'JetBrains Mono', monospace;
    background: rgba(124,58,237,0.2);
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    font-size: 0.8rem;
    color: var(--accent2);
  }

  .msg-bubble pre {
    font-family: 'JetBrains Mono', monospace;
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
    margin-top: 0.5rem;
    font-size: 0.78rem;
    color: var(--accent2);
    overflow-x: auto;
    white-space: pre-wrap;
  }

  .msg-bubble .highlight {
    color: var(--warn);
    font-weight: 700;
  }

  .msg-bubble .success {
    color: var(--success);
  }

  .msg-bubble ul {
    margin-left: 1.25rem;
    margin-top: 0.4rem;
  }

  .msg-bubble li {
    margin-bottom: 0.25rem;
  }

  /* SUGGESTION CHIPS */
  .suggestion-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.6rem;
  }

  .chip {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 0.3rem 0.75rem;
    border-radius: 999px;
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .chip:hover {
    background: var(--accent);
    color: white;
  }

  /* TYPING INDICATOR */
  .typing {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    align-self: flex-start;
  }

  .typing-dots {
    display: flex;
    gap: 0.3rem;
    padding: 0.75rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    border-top-left-radius: 4px;
  }

  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: typing 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%,100% { opacity: 0.3; transform: translateY(0); }
    50%      { opacity: 1; transform: translateY(-3px); }
  }

  /* ── INPUT BAR ── */
  .input-bar {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 0.75rem;
    align-items: center;
  }

  .chat-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    padding: 0.7rem 1rem;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }

  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted); }

  .send-btn {
    background: var(--accent);
    color: white;
    border: none;
    width: 42px; height: 42px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: #6d28d9; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .message { max-width: 95%; }
    .croo-badge { display: none; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="bot-avatar">🕵️</div>
    <div class="bot-info">

      <div class="bot-status">
        <span class="status-dot"></span>

  </div>
  <div class="croo-badge">⚡ Powered by CROO Network</div>
</div>

<!-- QUICK TOPICS -->

  <button class="topic-btn" onclick="quickTopic('case 3 hint')">👻 Case 3 Hint</button>
  <button class="topic-btn" onclick="quickTopic('payment help')">💰 Payment Help</button>

</div>

<!-- CHAT AREA -->
<div class="chat-area" id="chat-area"></div>

<!-- INPUT BAR -->
<div class="input-bar">
  <input
    class="chat-input"
    id="chat-input"

</div>

// CHAT ENGINE
// ════════════════════════════════════════

// Welcome message
window.onload = () => {
  setTimeout(() => {
    addBotMessage({
      text: `Namaste! Main hoon <strong>CaseQuery Assistant</strong> 🕵️<br><br>
Tumhari madad ke liye yahan hoon — SQL, cases, payment, ya koi bhi sawaal!<br><br>
<span class="success">Kya poochna chahte ho?</span>`,
      chips: ['Game kaise khelein', 'SQL help chahiye', 'Case hints do', 'Payment kaise kaam karta?']
    });
  }, 500);
};

function quickTopic(topic) {
  document.getElementById('chat-input').value = topic;
  sendMessage();
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  addUserMessage(text);
  input.value = '';
  document.getElementById('send-btn').disabled = true;

  // Show typing
  const typingId = showTyping();

  setTimeout(() => {
    removeTyping(typingId);
    const response = getResponse(text.toLowerCase());
    addBotMessage(response);
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }, 800 + Math.random() * 600);
}

function getResponse(text) {
  // Check all KB entries
  for (const [key, entry] of Object.entries(KB)) {
    if (key === 'default') continue;
    if (entry.triggers && entry.triggers.some(t => text.includes(t))) {
      return entry.response(text);
    }
  }

  // Special checks
  if (text.includes('select') || text.includes('from') || text.includes('where')) {
    return {
      text: `Query likhna seekh rahe ho — great! 💻<br><br>
Kaunse case ke liye query chahiye?`,
      chips: ['Case 1 ki query do', 'Case 2 ki query do', 'Case 3 ki query do', 'SQL basics sikhaao']
    };
  }

  if (text.includes('case') && text.includes('3') || text.includes('teen')) {
    return KB.case3Hint.response();
  }

  if (text.includes('case') && text.includes('2') || text.includes('do')) {
    return KB.case2Hint.response();
  }

  if (text.includes('case') && text.includes('1') || text.includes('ek')) {
    return KB.case1Hint.response();
  }

  return KB.default.response(text);
}

function addUserMessage(text) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = `
    <div class="msg-avatar">👤</div>
    <div class="msg-bubble">${escapeHtml(text)}</div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addBotMessage(data) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'message bot';

  let chipsHTML = '';
  if (data.chips && data.chips.length) {
    chipsHTML = `<div class="suggestion-chips">
      ${data.chips.map(c => `<button class="chip" onclick="quickTopic('${c}')">${c}</button>`).join('')}
    </div>`;
  }

  div.innerHTML = `
    <div class="msg-avatar">🕵️</div>
    <div class="msg-bubble">${data.text}${chipsHTML}</div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chat-area');
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = id;
  div.innerHTML = `
    <div class="msg-avatar bot-avatar" style="width:32px;height:32px;font-size:0.9rem;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#06b6d4);display:flex;align-items:center;justify-content:center;">🕵️</div>
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
